server {
    listen 80;
    server_name _;

    location = /health {
        default_type application/json;
        content_by_lua_file /etc/openresty/lua/health.lua;
    }

    location = /hello {
        default_type application/json;
        content_by_lua_block {
            ngx.say('{"message":"openresty all-in-one is ready"}')
        }
    }
}
