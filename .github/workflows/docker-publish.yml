name: docker-publish

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: lihongjie0209/openresty-x

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            dockerfile: Dockerfile
            suffix: ""
            channel_tag: latest
          - variant: slim
            dockerfile: Dockerfile.slim
            suffix: "-slim"
            channel_tag: slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}${{ matrix.suffix }}"
            echo "${IMAGE_NAME}:${MINOR}${{ matrix.suffix }}"
            echo "${IMAGE_NAME}:${MAJOR}${{ matrix.suffix }}"
            echo "${IMAGE_NAME}:${{ matrix.channel_tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${VERSION}${{ matrix.suffix }}"
            echo "org.opencontainers.image.title=openresty-x-${{ matrix.variant }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
